name: Release & Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd web/frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/frontend/dist --project-name=eyetrack

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST" ]; then
            VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml | head -1)
            echo "Initial release v${VERSION}"
            NOTES="Initial release."
          else
            COMMITS=$(git log "${LATEST}..HEAD" --pretty=format:'%s')

            FEAT=0; FIX=0
            while IFS= read -r msg; do
              [[ -z "$msg" ]] && continue
              if [[ "$msg" =~ ^feat ]]; then FEAT=1
              elif [[ "$msg" =~ ^(fix|perf|refactor) ]]; then FIX=1
              fi
            done <<< "$COMMITS"

            if (( !FEAT && !FIX )); then
              echo "No releasable commits since ${LATEST} — skipping."
              exit 0
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"

            if (( FEAT )); then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NOTES=$(git log "${LATEST}..HEAD" --pretty=format:'- %s (%h)')
          fi

          CURRENT=$(grep -oP 'version = "\K[^"]+' pyproject.toml | head -1)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
            git add pyproject.toml
            git commit -m "chore(release): v${VERSION}"
          fi

          git tag "v${VERSION}"
          git push origin master --tags

          echo "${NOTES}" > /tmp/notes.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/notes.md
